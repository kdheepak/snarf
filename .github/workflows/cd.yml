name: CD

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        description: "release tag to upload assets to"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag to upload assets to"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SNARF_BUILD_COMMIT: ${{ github.sha }}
  SNARF_BUILD_DATE: ${{ github.event.release.published_at || github.event.head_commit.timestamp }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --locked

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build & Upload Binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: snarf
          target: ${{ matrix.target }}
          archive: snarf-${{ matrix.os }}-${{ matrix.target }}-${{ inputs.tag || github.event.release.tag_name || github.ref_name }}
          ref: refs/tags/${{ inputs.tag || github.event.release.tag_name || github.ref_name }}
          locked: true
          tar: unix
          zip: windows
          checksum: sha256,sha512
          token: ${{ secrets.GITHUB_TOKEN }}
